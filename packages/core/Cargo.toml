[package]
name = "vfs-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]
name = "vfs_core"

[dependencies]
napi = { version = "2.16", features = ["napi4"] }
napi-derive = "2.16"
sha2 = "0.10"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zstd = "0.13"
walkdir = "2.4"
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"

[build-dependencies]
